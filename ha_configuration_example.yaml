# Home Assistant Configuration Example
# Bu dosyayı Home Assistant'ın configuration.yaml dosyasına ekleyin.

input_select:
  tarama_profili:
    name: Tarama Profili
    options:
      - "A4 Tam Sayfa (4 Fotoğraf)"
      - "A4 Yarım Sayfa Üst (2 Fotoğraf)"
      - "Tekli 10x15 (Dikey)"
      - "Tekli 15x10 (Yatay)"
      - "Tekli 13x18 (Dikey)"
      - "Tekli 18x13 (Yatay)"
      - "Tekli 20x25 (Dikey)"
      - "Vesikalık (4.5x6)"
    initial: "A4 Tam Sayfa (4 Fotoğraf)"
    icon: mdi:crop

  tarama_dpi:
    name: Tarama Çözünürlüğü (DPI)
    options:
      - "300"
      - "600"
      - "1200"
    initial: "1200"
    icon: mdi:quality-high

command_line:
  - sensor:
      name: Tarayıcı Durumu
      unique_id: tarayici_durumu
      # lsusb ile HP yazıcı bağlı mı kontrol eder. Bağlıysa durumu okur, değilse "Kapalı" yazar.
      command: "ssh -i /config/ssh_key -o StrictHostKeyChecking=no -q kullanici_adi@sunucu_adresi \"if lsusb | grep -iq 'Hewlett-Packard\\|HP'; then cat /home/{kullanici_adi}/scan_status.txt 2>/dev/null || echo '🟢 Hazır'; else echo '📴 Kapalı'; fi\""
      scan_interval: 2 # 2 saniyede bir durumu günceller

shell_command:
  # ---------------------------------------------------------
  # SADECE TARAMA (1200 DPI - RAW TIFF)
  # ---------------------------------------------------------
  # Sunucu sadece veriyi diske yazar, işlem yapmaz.
  # "nohup ... &" kullandık ki HA tarama bitene kadar donmasın (2-3 dk sürebilir).

  tara_ham: >
    {% set profil_map = {
      'A4 Tam Sayfa (4 Fotoğraf)': '1',
      'A4 Yarım Sayfa Üst (2 Fotoğraf)': '2',
      'Tekli 10x15 (Dikey)': '3',
      'Tekli 15x10 (Yatay)': '4',
      'Tekli 13x18 (Dikey)': '5',
      'Tekli 18x13 (Yatay)': '6',
      'Tekli 20x25 (Dikey)': '7',
      'Vesikalık (4.5x6)': '8'
    } %}
    ssh -i /config/ssh_key -o StrictHostKeyChecking=no {kullanici_adi}@{sunucu_adresi} "nohup bash /home/{kullanici_adi}/scan.sh {{ profil_map[states('input_select.tarama_profili')] }} {{ states('input_select.tarama_dpi') }} > /dev/null 2>&1 &"
